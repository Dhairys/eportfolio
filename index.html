<!DOCTYPE html>
<html>
<head>
<title>E-Portfolio Cover</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  background:#efe6da;
  font-family:serif;
}

/* SIMPLE CENTER */
.hero{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:25px;
}

/* CLEAN PAPER STYLE */
.card{
  background:#fff;
  padding:45px 35px;
  max-width:650px;
  width:100%;
  border:1px solid #ddd;
  border-radius:8px;
}

/* TITLE */
h1{
  font-size:38px;
  margin-bottom:8px;
}

/* SUBTEXT */
.subtitle{
  font-size:15px;
  color:#444;
  margin-bottom:20px;
}

/* SMALL LABEL */
.tag{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#333;
  margin-bottom:10px;
}

/* INFO BLOCK */
.info{
  margin-top:20px;
  font-size:15px;
  line-height:1.8;
}

/* BUTTON (simple, not fancy) */
a{
  display:inline-block;
  margin-top:20px;
  padding:8px 14px;
  border:1px solid #000;
  color:#000;
  text-decoration:none;
}

a:hover{
  background:#000;
  color:#fff;
}
</style>

</head>

<body>

<div class="hero">

  <div class="card">

    <div class="tag">E-PORTFOLIO</div>

    <h1>Dhairya Papneja</h1>

    <div class="subtitle">
      My learning journey, interests, and growth over time
    </div>

    <div class="info">
      <b>Class:</b> IX A<br>
      <b>School:</b> Police DAV Public School<br>
      <b>Session:</b> 2026–27<br><br>

      <b>Class Teacher:</b> Ms. Divya
    </div>

    <a href="about.html">Enter Portfolio</a>

  </div>

</div>

</body>
</html>
